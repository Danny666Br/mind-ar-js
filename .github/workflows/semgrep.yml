name: Semgrep SAST

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly scan every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # upload SARIF to GitHub Security tab
      contents: read

    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v4

      # ── Community rulesets ────────────────────────────────────────────────
      # javascript        → generic JS security (XSS, eval, prototype pollution)
      # nodejs            → Node.js specific (path traversal, child_process, etc.)
      # owasp-top-ten     → maps findings to OWASP categories
      # secrets           → hardcoded credentials / API keys
      - name: Run Semgrep (community rules)
        run: |
          semgrep ci \
            --config p/javascript \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config p/secrets \
            --sarif \
            --output semgrep-community.sarif \
            --error \
            --severity WARNING \
            --exclude 'dist/**' \
            --exclude 'dist-dev/**' \
            --exclude 'node_modules/**' \
            --exclude 'custom_tfjs/**'
        continue-on-error: true   # don't fail the job before uploading SARIF

      # ── MindAR-specific custom rules ──────────────────────────────────────
      - name: Run Semgrep (custom rules)
        run: |
          semgrep \
            --config .semgrep/rules.yml \
            --sarif \
            --output semgrep-custom.sarif \
            --severity INFO
        continue-on-error: true

      # ── Upload both SARIF files to GitHub Security tab ────────────────────
      - name: Upload community results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-community.sarif
          category: semgrep-community

      - name: Upload custom rule results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-custom.sarif
          category: semgrep-custom
