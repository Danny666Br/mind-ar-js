name: Semgrep SAST

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly scan every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # upload SARIF to GitHub Security tab
      contents: read

    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v4

      # ── Community rulesets ────────────────────────────────────────────────
      # semgrep ci requiere SEMGREP_APP_TOKEN y sale sin ejecutar si no lo hay.
      # semgrep scan corre siempre sin autenticación.
      - name: Run Semgrep (community rules)
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config p/secrets \
            --sarif \
            --output semgrep-community.sarif \
            --severity WARNING \
            --exclude 'dist/**' \
            --exclude 'dist-dev/**' \
            --exclude 'node_modules/**' \
            --exclude 'custom_tfjs/**' \
            || true
          # Si el scan salió sin escribir el archivo (zero findings), crear SARIF vacío válido
          test -f semgrep-community.sarif || echo \
            '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep","rules":[]}},"results":[]}]}' \
            > semgrep-community.sarif

      # ── MindAR-specific custom rules ──────────────────────────────────────
      - name: Run Semgrep (custom rules)
        run: |
          semgrep scan \
            --config .semgrep/rules.yml \
            --sarif \
            --output semgrep-custom.sarif \
            --severity INFO \
            || true
          test -f semgrep-custom.sarif || echo \
            '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep","rules":[]}},"results":[]}]}' \
            > semgrep-custom.sarif

      # ── Upload both SARIF files to GitHub Security tab ────────────────────
      - name: Upload community results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-community.sarif
          category: semgrep-community

      - name: Upload custom rule results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-custom.sarif
          category: semgrep-custom
